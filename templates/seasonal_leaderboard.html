{% extends "base.html" %}

{% block title %}Seasonal Leaderboard{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <!-- Tabs -->
        <ul class="nav nav-tabs mb-4" id="leaderboardTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link {% if request_type == 'weekly' %}active{% endif %}"
                    onclick="switchLeaderboard('weekly')" type="button">
                    <i class="bi bi-calendar-week me-1"></i>Weekly Rankings
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link {% if request_type == 'monthly' %}active{% endif %}"
                    onclick="switchLeaderboard('monthly')" type="button">
                    <i class="bi bi-calendar-month me-1"></i>Monthly Rankings
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link {% if request_type == 'lifetime' %}active{% endif %}"
                    onclick="switchLeaderboard('lifetime')" type="button">
                    <i class="bi bi-trophy-fill me-1"></i>Lifetime Rankings
                </button>
            </li>
        </ul>

        <!-- Leaderboard Table -->
        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="bg-primary text-white">
                            <tr>
                                <th>Rank</th>
                                <th>Player</th>
                                <th>Points</th>
                                <th>Matches</th>
                                <th>Wins</th>
                                <th>Win Rate</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <tr>
                                <td colspan="7" class="text-center">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <p class="mt-2 text-muted">Loading leaderboard...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Adjust Points Modal -->
<div class="modal fade" id="adjustPointsModal" tabindex="-1" aria-labelledby="adjustPointsModalLabel"
    aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="adjustPointsModalLabel">Adjust Points</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="adjustPointsForm">
                    <input type="hidden" id="adjustUserId">
                    <div class="mb-3">
                        <label for="adjustPlayerName" class="form-label">Player Name</label>
                        <input type="text" class="form-control" id="adjustPlayerName" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="currentPointsDisplay" class="form-label">Current Points</label>
                        <input type="number" class="form-control" id="currentPointsDisplay" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="adjustSeason" class="form-label">Season</label>
                        <select class="form-select" id="adjustSeason">
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="lifetime">Lifetime</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Adjustment Type</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="adjustmentType" id="addPoints"
                                value="add" checked>
                            <label class="form-check-label" for="addPoints">Add Points</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="adjustmentType" id="deductPoints"
                                value="deduct">
                            <label class="form-check-label" for="deductPoints">Deduct Points</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="adjustAmount" class="form-label">Points Amount</label>
                        <input type="number" class="form-control" id="adjustAmount" min="1" required>
                    </div>
                    <div class="mb-3">
                        <label for="adjustReason" class="form-label">Reason</label>
                        <textarea class="form-control" id="adjustReason" rows="3" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="savePointsAdjustment()">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    let currentType = '{{ request_type }}';

    function switchLeaderboard(type) {
        currentType = type;
        document.querySelectorAll('#leaderboardTabs .nav-link').forEach(tab => tab.classList.remove('active'));
        event.target.classList.add('active');
        loadLeaderboard(type);
    }

    function loadLeaderboard(type) {
        const tbody = document.getElementById('leaderboardBody');
        tbody.innerHTML = `
            <tr><td colspan="7" class="text-center">
                <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
                <p class="mt-2 text-muted">Loading...</p>
            </td></tr>`;

        fetch(`/api/leaderboard/seasonal?type=${type}`)
            .then(r => r.json())
            .then(data => {
                if (!data.success) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger fw-bold">Failed to load leaderboard</td></tr>';
                    return;
                }
                const leaderboard = data.leaderboard;
                if (!leaderboard || leaderboard.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted fw-semibold">No data available</td></tr>';
                    return;
                }

                let html = '';
                leaderboard.forEach((entry, index) => {
                    const rank = entry.rank || (index + 1);
                    const rankBadge = getRankBadge(rank);
                    const rowClass = getRowClass(rank);
                    html += `
                        <tr class="${rowClass}">
                            <td class="fw-bold text-dark">${rankBadge} ${rank}</td>
                            <td class="fw-semibold text-dark">${escapeHtml(entry.name)}<br><small class="text-muted" id="badges-${entry.user_id}"></small></td>
                            <td class="fw-semibold text-dark">${entry.points}</td>
                            <td class="text-dark">${entry.matches_played}</td>
                            <td class="fw-semibold text-dark">${entry.wins}</td>
                            <td class="fw-semibold text-dark">${entry.win_rate}%</td>
                            <td>
                                <button class="btn btn-sm btn-primary" onclick="openAdjustModal(${entry.user_id}, '${escapeHtml(entry.name)}', ${entry.points})">
                                    <i class="bi bi-sliders"></i> Adjust Points
                                </button>
                            </td>
                        </tr>`;
                });
                tbody.innerHTML = html;
                loadBadgesForLeaderboard(leaderboard);
            })
            .catch(() => {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger fw-bold">Error loading leaderboard</td></tr>';
            });
    }

    function loadBadgesForLeaderboard(leaderboard) {
        const userIds = leaderboard.map(e => e.user_id).join(',');
        if (!userIds) return;
        fetch(`/api/user/badges?user_ids=${userIds}`)
            .then(r => r.json())
            .then(data => {
                if (!data.success) return;
                const badgesMap = data.badges || {};
                Object.keys(badgesMap).forEach(uid => {
                    const el = document.getElementById('badges-' + uid);
                    if (!el) return;
                    const badges = badgesMap[uid];
                    if (!badges || !badges.length) return;
                    el.innerHTML = badges.slice(0, 3).map(b => '<i class="bi ' + b.icon + ' text-warning me-1"></i>').join('');
                });
            })
            .catch(() => { });
    }

    function getRankBadge(rank) {
        if (rank === 1) return '<i class="bi bi-trophy-fill text-warning"></i>';
        if (rank === 2) return '<i class="bi bi-trophy-fill text-secondary"></i>';
        if (rank === 3) return '<i class="bi bi-trophy-fill text-warning"></i>';
        return '<span class="text-muted fw-semibold">#' + rank + '</span>';
    }

    function getRowClass(rank) {
        if (rank === 1) return 'table-warning';
        if (rank === 2) return 'table-secondary';
        if (rank === 3) return 'table-warning';
        return '';
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    function openAdjustModal(userId, userName, currentPoints) {
        const modal = new bootstrap.Modal(document.getElementById('adjustPointsModal'));
        document.getElementById('adjustUserId').value = userId;
        document.getElementById('adjustPlayerName').value = userName;
        document.getElementById('currentPointsDisplay').value = currentPoints;
        document.getElementById('adjustAmount').value = '';
        document.getElementById('adjustReason').value = '';
        document.getElementById('adjustSeason').value = currentType;
        modal.show();
    }

    function savePointsAdjustment() {
        const userId = document.getElementById('adjustUserId').value;
        const season = document.getElementById('adjustSeason').value;
        const adjustmentType = document.querySelector('input[name="adjustmentType"]:checked').value;
        const amount = parseInt(document.getElementById('adjustAmount').value);
        const reason = document.getElementById('adjustReason').value;

        if (!amount || amount <= 0) {
            alert('Please enter a valid points amount');
            return;
        }
        if (!reason.trim()) {
            alert('Please provide a reason for adjustment');
            return;
        }

        const finalAmount = adjustmentType === 'deduct' ? -amount : amount;

        fetch('/api/leaderboard/adjust-points', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: parseInt(userId),
                season: season,
                amount: finalAmount,
                reason: reason
            })
        })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('adjustPointsModal')).hide();
                    loadLeaderboard(currentType);
                    alert(data.message || 'Points adjusted successfully!');
                } else {
                    alert(data.message || 'Failed to adjust points');
                }
            })
            .catch(err => {
                alert('Error adjusting points: ' + err.message);
            });
    }

    document.addEventListener('DOMContentLoaded', function () {
        loadLeaderboard(currentType);
    });
</script>
{% endblock %}
